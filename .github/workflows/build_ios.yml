name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/New_Flutter/**'
      - '.github/workflows/build_ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/New_Flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r NailCouture.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: NailCouture-iOS
          path: apps/New_Flutter/NailCouture.ipa

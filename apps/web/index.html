    <script>
      (function () {
        var appTheme = localStorage.getItem('app-theme') || 'theme_01';
        var skinDefaults = { theme_01: 'dark', theme_02: 'light', theme_03: 'light' };
        var storedScheme = localStorage.getItem('theme');
        var scheme = storedScheme === 'light' || storedScheme === 'dark'
          ? storedScheme
          : (skinDefaults[appTheme] || 'dark');
        document.documentElement.setAttribute('data-theme', scheme);
        document.documentElement.setAttribute('data-app-theme', appTheme);
      })();
    </script>
